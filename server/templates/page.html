<!DOCTYPE html>
<html>
    <head>
        <title>Send To Kindle</title>
        <style>
            body {
                background-color: #db7171;

            }
            h1 {
                color: #333;
                text-align: center;
            }
            form {
                max-width: 400px;
                margin: 0 auto;
                padding: 20px;
                background-color: #db7140;
                border-radius: 8px;
                box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            }
            input {
                color: aqua;
                
            }
            .browsebutton {
                background: cadetblue;
                display: inline-block;
                padding: 10px 20px;
                color: white;
                border-radius: 6px;
                cursor: pointer;
                font-weight: 600;
            }
        </style>
    </head>
    <body>
        <h1>Send To Kindle</h1>

        <h6 style="text-align: center">Upload an epub, fb2, or mobi file to send to your kindle (will be sent in mobi format)</h6>

        <form action="/upload" method="post" enctype="multipart/form-data">
            <label for="book" class="browsebutton">Choose File</label>
            <input type="file" id="book" name="book" style="display:none" accept=".mobi,.epub,.fb2" onchange="document.getElementById('filename').textContent = this.files[0]?.name || ''">
            <span id="filename"></span>
            <button type="submit" style="margin-left: 150px; background-color: cadetblue; color: rgb(189, 35, 35); padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600;">Upload</button>
        </form>

    </body>
</html>
